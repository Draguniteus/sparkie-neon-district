<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Neon District</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050508; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(0,255,200,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,200,150,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🌃 NEON DISTRICT �霓虹區🌃</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 8, 40);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.1;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 5;
controls.maxDistance = 65;

scene.add(new THREE.AmbientLight(0x0a0a10, 0.4));

const neonColors = [0x00ffcc, 0xff00ff, 0x00ffff, 0xff3366, 0xffff00, 0x00ff66];

// Wet asphalt ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80, 40, 40),
  new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
      void main() {
        float n = hash(floor(vUv * 35.0)) * 0.04;
        vec3 col = vec3(0.02, 0.02, 0.04) + n;
        // Puddle reflections
        float puddle = step(0.85, hash(floor(vUv * 8.0)));
        col += puddle * vec3(0.02, 0.04, 0.06);
        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);
ground.rotation.x = -Math.PI / 2;
ground.userData.isGround = true;
scene.add(ground);

// Building silhouettes - cyberpunk skyscrapers
for (let b = 0; b < 30; b++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 25 + Math.random() * 25;
  const bx = Math.cos(angle) * r;
  const bz = Math.sin(angle) * r;
  const height = 20 + Math.random() * 40;
  const width = 3 + Math.random() * 5;
  
  const building = new THREE.Mesh(
    new THREE.BoxGeometry(width, height, width * 0.8),
    new THREE.MeshStandardMaterial({ color: 0x0a0a10 })
  );
  building.position.set(bx, height / 2, bz);
  scene.add(building);
  
  // Neon window strips on buildings
  for (let w = 0; w < Math.floor(height / 4); w++) {
    if (Math.random() > 0.4) {
      const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
      const windowStrip = new THREE.Mesh(
        new THREE.BoxGeometry(width * 0.9, 0.3, 0.1),
        new THREE.MeshStandardMaterial({ color: neonColor, emissive: neonColor, emissiveIntensity: 2.5 })
      );
      windowStrip.position.set(bx, 2 + w * 4, bz + width * 0.42);
      scene.add(windowStrip);
    }
  }
  
  // Vertical neon signs on some buildings
  if (Math.random() > 0.6) {
    const signColor = neonColors[Math.floor(Math.random() * neonColors.length)];
    const sign = new THREE.Mesh(
      new THREE.BoxGeometry(2 + Math.random() * 2, 3 + Math.random() * 4, 0.2),
      new THREE.MeshStandardMaterial({ color: signColor, emissive: signColor, emissiveIntensity: 4.0 })
    );
    sign.position.set(bx, height * 0.7, bz + width * 0.5);
    scene.add(sign);
    
    const sLight = new THREE.PointLight(signColor, 3, 15);
    sLight.position.set(bx, height * 0.7, bz + width);
    scene.add(sLight);
  }
}

// Neon signs hanging from building edges
for (let s = 0; s < 20; s++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 15 + Math.random() * 20;
  const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
  
  const sign = new THREE.Mesh(
    new THREE.BoxGeometry(2 + Math.random() * 3, 1 + Math.random() * 1.5, 0.15),
    new THREE.MeshStandardMaterial({ color: neonColor, emissive: neonColor, emissiveIntensity: 3.5 })
  );
  sign.position.set(
    Math.cos(angle) * r,
    8 + Math.random() * 20,
    Math.sin(angle) * r
  );
  sign.rotation.y = -angle;
  scene.add(sign);
}

// Holographic billboards
for (let h = 0; h < 6; h++) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 12 + Math.random() * 8;
  const holoColor = neonColors[Math.floor(Math.random() * 3)];
  
  const billboard = new THREE.Mesh(
    new THREE.PlaneGeometry(5, 3),
    new THREE.MeshStandardMaterial({ color: holoColor, emissive: holoColor, emissiveIntensity: 2.0, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
  );
  billboard.position.set(
    Math.cos(angle) * radius,
    12 + Math.random() * 10,
    Math.sin(angle) * radius
  );
  billboard.rotation.y = -angle + Math.PI;
  billboard.userData.holoPhase = Math.random() * Math.PI * 2;
  billboard.userData.isHolo = true;
  scene.add(billboard);
}

// Neon poles / traffic lights
for (let p = 0; p < 12; p++) {
  const angle = (p / 12) * Math.PI * 2;
  const pr = 8;
  
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.1, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0x2a2a30 })
  );
  pole.position.set(Math.cos(angle) * pr, 2, Math.sin(angle) * pr);
  scene.add(pole);
  
  // Traffic light housing
  const lightBox = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.2, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x1a1a20 })
  );
  lightBox.position.set(Math.cos(angle) * pr, 4.3, Math.sin(angle) * pr);
  lightBox.rotation.y = -angle;
  scene.add(lightBox);
  
  // Light bulbs
  for (let l = 0; l < 3; l++) {
    const colors = [0xff0000, 0xffff00, 0x00ff00];
    const lBulb = new THREE.Mesh(
      new THREE.CircleGeometry(0.12, 12),
      new THREE.MeshStandardMaterial({ color: colors[l], emissive: colors[l], emissiveIntensity: Math.random() > 0.6 ? 3.0 : 0.2 })
    );
    lBulb.position.set(Math.cos(angle) * pr + 0.16, 4.1 + l * 0.35, Math.sin(angle) * pr);
    lBulb.rotation.y = -angle;
    scene.add(lBulb);
  }
}

// Rain particles
const rainCount = 2000;
const rainPos = new Float32Array(rainCount * 3);
for (let i = 0; i < rainCount; i++) {
  rainPos[i*3] = (Math.random() - 0.5) * 80;
  rainPos[i*3+1] = Math.random() * 40;
  rainPos[i*3+2] = (Math.random() - 0.5) * 80;
}
const rainGeo = new THREE.BufferGeometry();
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y = mod(p.y - uTime * 15.0, 45.0);
      gl_PointSize = 15.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = 1.0 - d * 2.0;
      vec3 col = vec3(0.3, 0.4, 0.5);
      gl_FragColor = vec4(col, a * 0.4);
    }
  `,
  transparent: true, depthWrite: false
});
const rain = new THREE.Points(rainGeo, rainMat);
rain.userData.isRain = true;
scene.add(rain);

// Reflection puddles
for (let p = 0; p < 15; p++) {
  const puddle = new THREE.Mesh(
    new THREE.CircleGeometry(1 + Math.random() * 2, 16),
    new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        void main() {
          float ripple = sin(length(vUv - 0.5) * 20.0 - uTime * 3.0) * 0.1;
          vec3 col = mix(vec3(0.0, 0.3, 0.4), vec3(0.1, 0.5, 0.6), ripple + 0.5);
          gl_FragColor = vec4(col, 0.5);
        }
      `,
      transparent: true, depthWrite: false
    })
  );
  puddle.rotation.x = -Math.PI / 2;
  puddle.position.set(
    (Math.random() - 0.5) * 50,
    0.02,
    (Math.random() - 0.5) * 50
  );
  puddle.userData.isPuddle = true;
  scene.add(puddle);
}

// Steam / mist rising from grates
const steamCount = 200;
const steamPos = new Float32Array(steamCount * 3);
for (let i = 0; i < steamCount; i++) {
  steamPos[i*3] = (Math.random() - 0.5) * 40;
  steamPos[i*3+1] = Math.random() * 3;
  steamPos[i*3+2] = (Math.random() - 0.5) * 40;
}
const steamGeo = new THREE.BufferGeometry();
steamGeo.setAttribute('position', new THREE.BufferAttribute(steamPos, 3));
const steamMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y += uTime * 0.5;
      p.y = mod(p.y, 4.0);
      p.x += sin(uTime + position.y) * 0.3;
      gl_PointSize = 25.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = (1.0 - d * 2.0) * 0.15;
      vec3 col = vec3(0.4, 0.5, 0.55);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const steam = new THREE.Points(steamGeo, steamMat);
steam.userData.isSteam = true;
scene.add(steam);

// Drone deliveries
for (let d = 0; d < 8; d++) {
  const drone = new THREE.Group();
  
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.2, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x1a1a25 })
  );
  drone.add(body);
  
  // Propellers
  for (let pr of [[-1,-1], [-1,1], [1,-1], [1,1]]) {
    const prop = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.25, 0.05, 8),
      new THREE.MeshStandardMaterial({ color: 0x2a2a35 })
    );
    prop.position.set(pr[0] * 0.4, 0.15, pr[1] * 0.4);
    drone.add(prop);
  }
  
  // Drone light
  const dLight = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 4.0 })
  );
  dLight.position.y = -0.15;
  drone.add(dLight);
  
  drone.position.set(
    -30 + d * 8 + Math.random() * 4,
    15 + Math.random() * 15,
    -30 + Math.random() * 60
  );
  drone.userData.dPhase = Math.random() * Math.PI * 2;
  drone.userData.isDrone = true;
  scene.add(drone);
}

// Flying cars (neon streaks)
const carCount = 30;
const carPos = new Float32Array(carCount * 3);
for (let i = 0; i < carCount; i++) {
  carPos[i*3] = (Math.random() - 0.5) * 70;
  carPos[i*3+1] = 5 + Math.random() * 20;
  carPos[i*3+2] = (Math.random() - 0.5) * 70;
}
const carGeo = new THREE.BufferGeometry();
carGeo.setAttribute('position', new THREE.BufferAttribute(carPos, 3));
const carMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.x += uTime * 8.0;
      p.x = mod(p.x + 35.0, 70.0) - 35.0;
      gl_PointSize = 10.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = 1.0 - d * 2.0;
      vec3 col = vec3(0.0, 1.0, 0.8);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const cars = new THREE.Points(carGeo, carMat);
cars.userData.isCars = true;
scene.add(cars);

// Cyberpunk fog / atmosphere
scene.fog = new THREE.FogExp2(0x050508, 0.012);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (rain.userData.isRain) rain.material.uniforms.uTime.value = t;
  if (ground.userData.isGround && ground.material.uniforms.uTime) ground.material.uniforms.uTime.value = t;
  if (cars.userData.isCars) cars.material.uniforms.uTime.value = t;
  if (steam.userData.isSteam) steam.material.uniforms.uTime.value = t;
  
  scene.children.forEach(child => {
    if (child.userData.isHolo && child.material.uniforms) {
      child.material.opacity = 0.5 + Math.sin(t * 3 + child.userData.holoPhase) * 0.3;
    }
    if (child.userData.isDrone) {
      child.position.x += Math.sin(t * 0.3 + child.userData.dPhase) * 0.03;
      child.position.y += Math.cos(t * 0.2 + child.userData.dPhase) * 0.015;
    }
  });
  
  scene.children.forEach(child => {
    if (child.userData.isPuddle && child.material.uniforms) child.material.uniforms.uTime.value = t;
  });
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
